# .github/workflows/scrape.yml
name: Daily VAHAN Scrape

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright pandas openpyxl

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Clear progress for fresh scrape
        run: |
          rm -rf vahan_downloads
          mkdir -p vahan_downloads
          echo "Wiped vahan_downloads for fresh run"

      - name: Run scraper
        run: |
          python scraper.py --no-resume
        env:
          PYTHONUNBUFFERED: "1"

      - name: List scraper output (debug)
        if: always()
        run: |
          echo "===== vahan_downloads contents ====="
          ls -la vahan_downloads/ || echo "directory missing"
          echo ""
          echo "===== xlsx count ====="
          ls vahan_downloads/*.xlsx 2>/dev/null | wc -l || echo "0"

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-diagnostics-${{ github.run_number }}
          path: |
            vahan_downloads/*.log
            vahan_downloads/*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Move downloaded files to data/
        run: |
          mkdir -p data
          if [ -d "vahan_downloads" ]; then
            find vahan_downloads -name "*.xlsx" -exec mv {} data/ \;
            COUNT=$(ls data/*.xlsx 2>/dev/null | wc -l)
            echo "Total xlsx files now in data/: $COUNT"
          else
            echo "No vahan_downloads directory found"
          fi

      - name: Verify scrape produced files
        run: |
          # Count xlsx files that were just modified in the last 60 minutes
          NEW=$(find data -name "*.xlsx" -mmin -60 2>/dev/null | wc -l)
          echo "Files freshly written this run: $NEW"
          if [ "$NEW" -eq 0 ]; then
            echo "::error::Scraper produced 0 new xlsx files. Check the diagnostics artifact for log + screenshots."
            exit 1
          fi

      - name: Commit scraped data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data files to commit"
          else
            COUNT=$(git diff --cached --name-only | grep "\.xlsx$" | wc -l)
            git commit -m "chore: update vahan data — $COUNT files [$(date +'%Y-%m-%d')]"
            git push
          fi
